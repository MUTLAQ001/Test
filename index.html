<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>المقررات المطروحة — جامعة القصيم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F6FA; --card:#FFFFFF;
  --qu:#0F3D6E; --qu-dark:#0B2E52; --qu-soft:#EAF1F9;
  --gold:#C6A15B;
  --ink:#1B2430; --muted:#647089; --line:#E6EBF3;
  --open:#1B8A5A; --open-bg:#E7F5EE;
  --closed:#B4462F; --closed-bg:#FBECE8;
  --shadow:0 1px 2px rgba(16,42,74,.04), 0 8px 24px rgba(16,42,74,.06);
  --radius:16px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;
  font-size:15px; line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit}

/* ---------- Header ---------- */
.topbar{
  background:linear-gradient(180deg,var(--qu) 0%,var(--qu-dark) 100%);
  color:#fff;
  border-bottom:3px solid var(--gold);
}
.topbar .inner{
  max-width:1080px; margin:0 auto; padding:16px 22px;
  display:flex; align-items:center; justify-content:space-between; gap:16px;
}
.brand{display:flex; align-items:center; gap:14px; min-width:0}
.emblem{
  width:46px; height:46px; border-radius:13px; flex:none;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.28);
  display:grid; place-items:center;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
}
.emblem span{
  font-family:"Readex Pro",serif; font-weight:700; font-size:26px;
  color:#fff; line-height:1; margin-top:-2px;
}
.brand-text{display:flex; flex-direction:column; min-width:0}
.brand-ar{
  font-family:"Readex Pro",sans-serif; font-weight:600;
  font-size:19px; letter-spacing:.2px; white-space:nowrap;
}
.brand-en{
  font-size:10.5px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,255,255,.72); font-weight:500;
}
.portal-tag{
  font-size:12.5px; color:rgba(255,255,255,.85);
  border:1px solid rgba(255,255,255,.22); border-radius:999px;
  padding:6px 14px; white-space:nowrap; background:rgba(255,255,255,.05);
}

/* ---------- Page ---------- */
.wrap{max-width:1080px; margin:0 auto; padding:28px 22px 60px}
.pagehead{margin:6px 0 20px}
.eyebrow{
  font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
  color:var(--gold);
}
h1{
  font-family:"Readex Pro",sans-serif; font-weight:600;
  font-size:26px; margin:6px 0 10px; color:var(--qu-dark);
}
.meta{display:flex; flex-wrap:wrap; gap:8px 10px; align-items:center}
.chip{
  font-size:12.5px; font-weight:500; color:var(--muted);
  background:#fff; border:1px solid var(--line); border-radius:999px;
  padding:5px 12px;
}
.chip strong{color:var(--qu); font-weight:600}
.note{
  margin-top:14px; font-size:13px; color:var(--muted);
  display:flex; gap:8px; align-items:flex-start;
}
.note svg{flex:none; margin-top:3px}

/* ---------- Toolbar ---------- */
.toolbar{
  display:flex; flex-wrap:wrap; gap:12px; align-items:center;
  margin:18px 0 14px;
}
.search{position:relative; flex:1 1 280px; min-width:220px}
.search svg{
  position:absolute; inset-inline-start:14px; top:50%; transform:translateY(-50%);
  color:var(--muted); pointer-events:none;
}
.search input{
  width:100%; padding:12px 44px 12px 16px;
  border:1px solid var(--line); border-radius:12px; background:#fff;
  font-family:inherit; font-size:14.5px; color:var(--ink);
  box-shadow:var(--shadow); transition:border-color .15s, box-shadow .15s;
}
.search input::placeholder{color:#9AA6BC}
.search input:focus{
  outline:none; border-color:var(--qu);
  box-shadow:0 0 0 4px rgba(15,61,110,.10);
}
.count{font-size:13px; color:var(--muted); white-space:nowrap}
.count b{color:var(--qu-dark); font-weight:600}

/* ---------- Table card ---------- */
.tablecard{
  background:var(--card); border:1px solid var(--line);
  border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
}
table{width:100%; border-collapse:collapse}
thead th{
  background:var(--qu-soft); color:var(--qu-dark);
  font-weight:600; font-size:13px; text-align:start;
  padding:14px 16px; border-bottom:1px solid var(--line); white-space:nowrap;
}
tbody td{
  padding:14px 16px; border-bottom:1px solid var(--line);
  font-size:14px; vertical-align:middle;
}
.course-row:hover td{background:#FAFBFE}
.course-row.open-detail td{background:var(--qu-soft)}
.c-code{font-weight:600; color:var(--qu); white-space:nowrap; letter-spacing:.3px}
.c-name{font-weight:500}
.c-loc{color:var(--muted); font-size:13px}
.c-sec{font-variant-numeric:tabular-nums; color:var(--ink)}
.act{
  display:inline-block; font-size:12px; font-weight:500;
  padding:3px 10px; border-radius:999px; background:#EEF1F6; color:#556072;
}
.status{
  display:inline-flex; align-items:center; gap:6px;
  font-size:12.5px; font-weight:600; padding:4px 11px; border-radius:999px;
  white-space:nowrap;
}
.status .dot{width:7px; height:7px; border-radius:50%}
.status.open{background:var(--open-bg); color:var(--open)}
.status.open .dot{background:var(--open)}
.status.closed{background:var(--closed-bg); color:var(--closed)}
.status.closed .dot{background:var(--closed)}
.details-btn{
  display:inline-flex; align-items:center; gap:7px;
  font-family:inherit; font-size:13px; font-weight:500; color:var(--qu);
  background:#fff; border:1px solid var(--line); border-radius:10px;
  padding:7px 13px; cursor:pointer; white-space:nowrap;
  transition:background .15s, border-color .15s;
}
.details-btn:hover{background:var(--qu-soft); border-color:#CBDBF0}
.details-btn:focus-visible{outline:2px solid var(--qu); outline-offset:2px}
.details-btn .chev{transition:transform .2s}
.course-row.open-detail .details-btn .chev{transform:rotate(180deg)}

/* ---------- Detail panel ---------- */
.detail-row td{padding:0; border-bottom:1px solid var(--line); background:#fff}
.detail-inner{padding:18px 20px; display:grid; gap:14px}
.detail-title{
  font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
  color:var(--muted);
}
.meetings{display:flex; flex-wrap:wrap; gap:10px}
.meeting{
  display:flex; align-items:center; gap:12px;
  background:var(--qu-soft); border:1px solid #DCE8F6; border-radius:12px;
  padding:10px 14px;
}
.meeting .mt-time{
  font-weight:600; color:var(--qu-dark); font-size:14px;
  font-variant-numeric:tabular-nums; white-space:nowrap;
}
.meeting .mt-room{
  font-size:13px; color:var(--muted); padding-inline-start:12px;
  border-inline-start:1px solid #CBDBF0;
}
.exam{font-size:13.5px; color:var(--ink)}
.exam b{color:var(--qu); font-weight:600}
.exam .none{color:var(--muted); font-weight:400}

.empty{padding:48px 20px; text-align:center; color:var(--muted)}
.empty b{display:block; color:var(--ink); font-weight:600; margin-bottom:4px; font-size:15px}

footer{
  max-width:1080px; margin:0 auto; padding:22px; text-align:center;
  color:var(--muted); font-size:12.5px;
}

/* ---------- Responsive: collapse table to cards ---------- */
@media (max-width:780px){
  thead{display:none}
  table, tbody, tr, td{display:block; width:100%}
  .course-row{
    border-bottom:8px solid var(--bg); padding:6px 4px 10px; position:relative;
  }
  .course-row:hover td, .course-row.open-detail td{background:transparent}
  .course-row td{
    border:none; padding:7px 16px; display:flex; justify-content:space-between;
    align-items:center; gap:14px;
  }
  .course-row td::before{
    content:attr(data-th); color:var(--muted); font-size:12.5px; font-weight:500;
    flex:none;
  }
  .course-row td.cell-details{justify-content:flex-end; padding-top:4px}
  .course-row td.cell-details::before{display:none}
  .details-btn{width:100%; justify-content:center}
  .detail-row td{border:none}
  .detail-inner{padding:4px 16px 16px}
}

@media (prefers-reduced-motion:reduce){
  *{transition:none !important}
}
</style>
</head>
<body>

          <th scope="col">التفاصيل</th>

      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<script>
(function(){
  const DATA = JSON.parse(document.getElementById('data').textContent);
  const tbody = document.getElementById('tbody');
  const countEl = document.getElementById('count');
  const totalChip = document.getElementById('totalChip');
  const q = document.getElementById('q');
  totalChip.textContent = toAr(DATA.length) + ' شعبة مطروحة';

  function toAr(n){return String(n).replace(/[0-9]/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}

  function parseMeetings(section){
    // format: " <sec> @t <time> @r <room> @n <sec> @t <time> @r <room>"
    if(!section) return [];
    return section.split('@n').map(part=>{
      const m = part.match(/@t\s*([\s\S]*?)\s*@r\s*([\s\S]*)$/);
      if(!m) return null;
      return {time:(m[1]||'').trim(), room:(m[2]||'').trim()};
    }).filter(Boolean);
  }

  function render(list){
    tbody.innerHTML='';
    countEl.innerHTML = list.length
      ? 'عدد النتائج: <b>'+toAr(list.length)+'</b>'
      : '';
    if(!list.length){
      const tr=document.createElement('tr');
      tr.innerHTML='<td colspan="8"><div class="empty"><b>لا توجد نتائج</b>جرّب رمزًا أو اسمًا آخر.</div></td>';
      tbody.appendChild(tr); return;
    }
    const frag=document.createDocumentFragment();
    list.forEach((c,i)=>{
      const open = c.status.indexOf('مفتوح')!==-1;
      const meetings = parseMeetings(c.section);
      const tr=document.createElement('tr');
      tr.className='course-row '+(i%2===0?'ROW1':'ROW2');
      tr.innerHTML =
        '<td data-th="رمز المقرر"><span class="c-code">'+esc(c.code)+'</span></td>'+
        '<td data-th="اسم المقرر"><span class="c-name">'+esc(c.name)+'</span></td>'+
        '<td data-th="المقر"><span class="c-loc">'+esc(c.loc||'—')+'</span></td>'+
        '<td data-th="الشعبة"><span class="c-sec">'+esc(c.sec)+'</span></td>'+
        '<td data-th="النشاط"><span class="act">'+esc(c.act||'—')+'</span></td>'+
        '<td data-th="الساعات">'+esc(c.hrs?c.hrs:'')+'</td>'+
        '<td data-th="الحالة"><span class="status '+(open?'open':'closed')+'"><span class="dot"></span>'+esc(c.status)+'</span></td>'+
        '<td class="cell-details" data-th="التفاصيل"></td>';
      const btn=document.createElement('button');
      btn.className='details-btn'; btn.type='button';
      btn.setAttribute('aria-expanded','false');
      btn.innerHTML='التفاصيل<svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
      const dcell=tr.querySelector('.cell-details');
      dcell.appendChild(btn);
      /* hidden fields matching the portal contract so the original extractor works.
         instructor is intentionally omitted so doctor names stay hidden. */
      const hSec=document.createElement('input');
      hSec.type='hidden'; hSec.id='qu:offeredCoursesTable:'+i+':section'; hSec.value=c.section||'';
      const hExam=document.createElement('input');
      hExam.type='hidden'; hExam.id='qu:offeredCoursesTable:'+i+':examPeriod'; hExam.value=c.exam||'';
      dcell.appendChild(hSec); dcell.appendChild(hExam);

      const dtr=document.createElement('tr');
      dtr.className='detail-row'; dtr.hidden=true;
      const examTxt = c.exam
        ? 'فترة الاختبار: <b>'+esc(toAr(c.exam))+'</b>'
        : 'فترة الاختبار: <span class="none">غير محددة</span>';
      const meetHtml = meetings.length
        ? meetings.map(m=>'<div class="meeting"><span class="mt-time">'+esc(toAr(m.time))+'</span>'+(m.room?'<span class="mt-room">'+esc(m.room)+'</span>':'')+'</div>').join('')
        : '<div class="meeting"><span class="mt-time">لا توجد أوقات محددة</span></div>';
      dtr.innerHTML =
        '<td colspan="8"><div class="detail-inner">'+
          '<div><div class="detail-title">أوقات الشعبة</div><div class="meetings">'+meetHtml+'</div></div>'+
          '<div class="exam">'+examTxt+'</div>'+
        '</div></td>';

      btn.addEventListener('click',()=>{
        const isOpen = !dtr.hidden;
        dtr.hidden = isOpen;
        tr.classList.toggle('open-detail', !isOpen);
        btn.setAttribute('aria-expanded', String(!isOpen));
      });

      frag.appendChild(tr); frag.appendChild(dtr);
    });
    tbody.appendChild(frag);
  }

  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));}

  function filter(){
    const term=q.value.trim().toLowerCase();
    if(!term){ render(DATA); return; }
    const t = term.replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d));
    render(DATA.filter(c=>{
      return (c.code+' '+c.name+' '+c.sec+' '+c.loc+' '+c.act+' '+c.status)
        .toLowerCase().includes(t) || (c.code+' '+c.name+' '+c.sec).toLowerCase().includes(term);
    }));
  }

  q.addEventListener('input', filter);
  render(DATA);
})();
</script>
</body>
